# MedCollab monorepo — works whether or not Root Directory is set in Railway UI.
#
# If Root Directory = medcollab-backend  → runs npm from current folder
# If Root Directory = empty (repo root) → cd into medcollab-backend first

[build]
builder = "NIXPACKS"
buildCommand = "if [ -d medcollab-backend ]; then cd medcollab-backend; fi && npm ci --omit=dev"

[deploy]
startCommand = "if [ -d medcollab-backend ]; then cd medcollab-backend; fi && node src/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
