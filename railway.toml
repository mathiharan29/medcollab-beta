# MedCollab monorepo — Railway deploys the backend from repo root.
# Use this if you cannot find "Root Directory" in the Railway UI.

[build]
builder = "NIXPACKS"
buildCommand = "cd medcollab-backend && npm ci --omit=dev"

[deploy]
startCommand = "cd medcollab-backend && node src/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
